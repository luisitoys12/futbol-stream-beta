<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión - FutbolStream Beta</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
      <circle cx="16" cy="16" r="4" fill="currentColor"/>
    </svg>
    <div>
      <h1>FutbolStream</h1>
      <sup class="badge">BETA</sup>
    </div>
  </div>
  <form id="loginForm">
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" required placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" required placeholder="••••••••">
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-full">Entrar</button>
  </form>
  <p class="auth-footer">¿No tienes cuenta? <a href="/register">Regístrate gratis</a> · <a href="/register/streamer">Soy streamer</a></p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Entrando...'; btn.disabled = true;
  const res = await fetch('/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: email.value, password: password.value })
  });
  const data = await res.json();
  if (data.success) { location.href = '/home'; }
  else {
    errorMsg.textContent = data.error; errorMsg.style.display = 'block';
    btn.textContent = 'Entrar'; btn.disabled = false;
  }
});
</script>
</body>
</html>
