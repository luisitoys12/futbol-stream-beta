<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutbolStream</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',sans-serif;background:var(--color-bg);color:var(--color-text);min-height:100dvh}
a{text-decoration:none;color:inherit}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:var(--color-surface);border-bottom:1px solid var(--color-border);position:sticky;top:0;z-index:50}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--color-primary)}
.nav-actions{display:flex;align-items:center;gap:10px}
.nav-user{font-size:.85rem;color:var(--color-text-muted)}
.btn-sm{padding:6px 14px;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all 150ms}
.btn-outline{background:transparent;border:1px solid var(--color-border);color:var(--color-text-muted)}
.btn-outline:hover{background:rgba(255,255,255,.05);color:var(--color-text)}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{opacity:.9}

/* Main */
.main{max-width:1200px;margin:0 auto;padding:32px 24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-header h2{font-size:1.1rem;font-weight:700}
.live-dot{width:8px;height:8px;background:#f44336;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Grid */
.channels-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.channel-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 150ms,box-shadow 150ms}
.channel-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-thumb{position:relative;aspect-ratio:16/9;background:var(--color-surface-offset);overflow:hidden}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.live-badge{position:absolute;top:8px;left:8px;background:#f44336;color:#fff;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.04em}
.viewers-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:.75rem;padding:3px 8px;border-radius:4px}
.card-body{padding:14px 16px}
.card-title{font-weight:700;font-size:.95rem;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-owner{font-size:.78rem;color:var(--color-text-muted)}
.card-type{font-size:.72rem;color:var(--color-text-faint);margin-top:6px;text-transform:uppercase;letter-spacing:.06em}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--color-text-muted)}
.empty h3{font-size:1.1rem;margin-bottom:8px;color:var(--color-text)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">
    <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="16" r="4" fill="currentColor"/></svg>
    FutbolStream
  </div>
  <div class="nav-actions">
    <span class="nav-user" id="navUser"></span>
    <a href="/studio" id="studioLink" style="display:none"><button class="btn-sm btn-outline">Studio</button></a>
    <a href="/admin"  id="adminLink"  style="display:none"><button class="btn-sm btn-outline">Admin</button></a>
    <button class="btn-sm btn-outline" onclick="logout()">Salir</button>
  </div>
</nav>

<main class="main">
  <div class="section-header">
    <h2><span class="live-dot"></span>Canales en vivo y disponibles</h2>
    <span id="channelCount" style="font-size:.8rem;color:var(--color-text-muted)"></span>
  </div>
  <div class="channels-grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div style="font-size:3rem;margin-bottom:12px">📺</div>
    <h3>No hay canales todavia</h3>
    <p>Los streamers con invitacion pueden crear su canal en /studio</p>
  </div>
</main>

<script>
async function init() {
  const me = await fetch('/api/admin/me').then(r=>r.json());
  document.getElementById('navUser').textContent = me.email?.split('@')[0] || '';
  if (['streamer','admin'].includes(me.role)) document.getElementById('studioLink').style.display='block';
  if (me.role === 'admin') document.getElementById('adminLink').style.display='block';

  const channels = await fetch('/api/channels').then(r=>r.json());
  const grid = document.getElementById('grid');
  document.getElementById('channelCount').textContent = channels.length + ' canal' + (channels.length!==1?'es':'');

  if (!channels.length) {
    document.getElementById('empty').style.display='block';
    return;
  }

  grid.innerHTML = channels.map(c => `
    <a href="/watch/${c.slug}">
      <div class="channel-card">
        <div class="card-thumb">
          ${c.thumbnail
            ? `<img src="${c.thumbnail}" alt="${c.name}" loading="lazy">`
            : `<div class="card-thumb-placeholder">⚽</div>`}
          ${c.is_live ? '<span class="live-badge">EN VIVO</span>' : ''}
          ${c.is_live ? `<span class="viewers-badge">${c.viewer_count||0} viendo</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${c.name}</div>
          <div class="card-owner">${c.owner_email?.split('@')[0] || ''}</div>
          <div class="card-type">${c.type}</div>
        </div>
      </div>
    </a>`).join('');
}

function logout() {
  document.cookie='session=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
  location.href='/login';
}

init();
setInterval(init, 30000); // refresca cada 30s
</script>
</body>
</html>
