<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unirse - FutbolStream Beta</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
      <circle cx="16" cy="16" r="4" fill="currentColor"/>
    </svg>
    <h1>Unirse a la Beta</h1>
  </div>
  <form id="joinForm">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" required placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" required placeholder="Mínimo 8 caracteres">
    </div>
    <div class="form-group">
      <label for="invite_code">Código de invitación</label>
      <input type="text" id="invite_code" required placeholder="XXXXXX" style="text-transform:uppercase;letter-spacing:0.15em">
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div id="successMsg" class="success-msg" style="display:none"></div>
    <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
  </form>
  <p class="auth-footer">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
</div>
<script>
document.getElementById('joinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Creando cuenta...';
  btn.disabled = true;
  const res = await fetch('/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      invite_code: document.getElementById('invite_code').value.toUpperCase()
    })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('successMsg').textContent = '✅ Cuenta creada. Redirigiendo...';
    document.getElementById('successMsg').style.display = 'block';
    setTimeout(() => window.location.href = '/login', 2000);
  } else {
    const err = document.getElementById('errorMsg');
    err.textContent = data.error || 'Error al registrarse';
    err.style.display = 'block';
    btn.textContent = 'Crear cuenta';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
