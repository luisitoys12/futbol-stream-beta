<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ver canal - FutbolStream Beta</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8/dist/video-js.min.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">
    <a href="/">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/>
        <circle cx="16" cy="16" r="4" fill="currentColor"/>
      </svg>
    </a>
    <span id="channelName">Cargando...</span>
  </div>
  <div class="nav-links">
    <form action="/auth/logout" method="POST">
      <button type="submit" class="btn btn-ghost">Salir</button>
    </form>
  </div>
</nav>

<main class="watch-layout">
  <div class="player-wrap">
    <div id="playerContainer">
      <video id="hlsPlayer" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto" style="width:100%;height:100%"></video>
    </div>
  </div>
  <div class="channel-meta" id="channelMeta">
    <div class="skeleton" style="height:24px;width:60%;margin-bottom:8px"></div>
    <div class="skeleton" style="height:16px;width:40%"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/video.js@8/dist/video.min.js"></script>
<script>
const slug = location.pathname.split('/').pop();
const INGEST = '';

async function loadChannel() {
  const res = await fetch(`/api/channels/${slug}`);
  if (!res.ok) { document.body.innerHTML = '<div class="error-full">Canal no encontrado</div>'; return; }
  const ch = await res.json();
  document.title = `${ch.name} - FutbolStream Beta`;
  document.getElementById('channelName').textContent = ch.name;
  document.getElementById('channelMeta').innerHTML = `
    <h2>${ch.name} ${ch.is_live ? '<span class="live-badge">EN VIVO</span>' : ''}</h2>
    <p>${ch.description || ''}</p>
  `;

  const player = videojs('hlsPlayer', {
    fluid: true,
    responsive: true,
    playbackRates: [0.5, 1, 1.5, 2]
  });

  if (ch.type === 'youtube') {
    // Embed YouTube nocookie
    document.getElementById('playerContainer').innerHTML = `
      <iframe
        src="https://www.youtube-nocookie.com/embed/${ch.youtube_id}?autoplay=1&rel=0&modestbranding=1"
        style="width:100%;aspect-ratio:16/9;border:none"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>`;
  } else if (ch.type === 'rtmp' || ch.type === 'srt') {
    // HLS desde MediaMTX
    const hlsUrl = `/hls/${ch.stream_key || slug}/index.m3u8`;
    player.src({ type: 'application/x-mpegURL', src: hlsUrl });
    player.play();
  } else if (ch.type === 'video') {
    // Video subido - obtener URL firmada
    const vRes = await fetch(`/api/videos/${ch.id}/play`);
    const { url } = await vRes.json();
    player.src({ type: 'video/mp4', src: url });
  }
}
loadChannel();
</script>
</body>
</html>
