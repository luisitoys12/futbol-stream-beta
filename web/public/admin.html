<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - FutbolStream</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/dashboard.css">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="dash-layout">
  <aside class="dash-sidebar">
    <div class="dash-logo">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="2"/><circle cx="16" cy="16" r="4" fill="currentColor"/></svg>
      <span>Admin</span>
    </div>
    <nav>
      <a href="/home" class="dash-nav-item">&#8592; Inicio</a>
      <a href="#" class="dash-nav-item active" onclick="showTab('stats',this);return false">&#128202; Stats</a>
      <a href="#" class="dash-nav-item" onclick="showTab('users',this);return false">&#128101; Usuarios</a>
      <a href="#" class="dash-nav-item" onclick="showTab('codes',this);return false">&#127973; Invite Codes</a>
      <a href="#" class="dash-nav-item" onclick="showTab('channels',this);return false">&#128250; Canales</a>
    </nav>
  </aside>
  <main class="dash-main">
    <div class="dash-header"><h1>Panel de Administracion</h1></div>

    <section id="tab-stats">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:28px">
        <div class="dash-card" style="margin:0"><div style="font-size:2.4rem;font-weight:700;color:var(--color-primary);line-height:1;margin-bottom:6px" id="s-users">-</div><div style="font-size:.75rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em">Usuarios</div></div>
        <div class="dash-card" style="margin:0"><div style="font-size:2.4rem;font-weight:700;color:var(--color-primary);line-height:1;margin-bottom:6px" id="s-streamers">-</div><div style="font-size:.75rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em">Streamers</div></div>
        <div class="dash-card" style="margin:0"><div style="font-size:2.4rem;font-weight:700;color:var(--color-primary);line-height:1;margin-bottom:6px" id="s-channels">-</div><div style="font-size:.75rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em">Canales</div></div>
        <div class="dash-card" style="margin:0"><div style="font-size:2.4rem;font-weight:700;color:var(--color-primary);line-height:1;margin-bottom:6px" id="s-codes">-</div><div style="font-size:.75rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.08em">Codes libres</div></div>
      </div>
    </section>

    <section id="tab-users" style="display:none">
      <div class="dash-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0">Usuarios</h2></div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Email</th><th>Rol</th><th>Registrado</th><th>Acciones</th></tr></thead>
          <tbody id="usersTable"></tbody>
        </table></div>
      </div>
    </section>

    <section id="tab-codes" style="display:none">
      <div class="dash-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="margin:0">Invite Codes</h2>
          <button class="btn btn-primary" onclick="generateCodes()">+ Generar</button>
        </div>
        <div id="newCodesBox" style="display:none;background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px"></div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Codigo</th><th>Estado</th><th>Expira</th><th></th></tr></thead>
          <tbody id="codesTable"></tbody>
        </table></div>
      </div>
    </section>

    <section id="tab-channels" style="display:none">
      <div class="dash-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0">Canales</h2></div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Canal</th><th>Tipo</th><th>Owner</th><th>Estado</th><th></th></tr></thead>
          <tbody id="channelsTable"></tbody>
        </table></div>
      </div>
    </section>
  </main>
</div>

<style>
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{text-align:left;padding:10px 12px;color:var(--color-text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--color-border)}
td{padding:12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
.role-badge{padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase}
.role-admin{background:rgba(244,67,54,.15);color:#f44336}
.role-streamer{background:rgba(0,200,83,.12);color:var(--color-primary)}
.role-user{background:rgba(255,255,255,.06);color:var(--color-text-muted)}
.code-chip{background:rgba(0,200,83,.1);border:1px solid rgba(0,200,83,.25);color:var(--color-primary);padding:5px 12px;border-radius:var(--radius-md);font-family:monospace;font-size:.85rem;cursor:pointer;display:inline-block}
.code-chip:hover{background:rgba(0,200,83,.2)}
.badge-used{background:rgba(255,255,255,.04);color:var(--color-text-muted);padding:3px 8px;border-radius:999px;font-size:.72rem}
.badge-active{background:rgba(0,200,83,.1);color:var(--color-primary);padding:3px 8px;border-radius:999px;font-size:.72rem}
.btn-del{background:rgba(244,67,54,.08);color:#f44336;border:none;padding:4px 10px;border-radius:var(--radius-md);cursor:pointer;font-size:.8rem}
.btn-del:hover{background:rgba(244,67,54,.18)}
.role-select{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text);padding:4px 8px;font-size:.8rem}
</style>

<script>
function showTab(name,el){
  document.querySelectorAll('[id^="tab-"]').forEach(s=>s.style.display='none');
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('.dash-nav-item').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  if(name==='users')loadUsers();
  if(name==='codes')loadCodes();
  if(name==='channels')loadChannels();
}
async function loadStats(){
  const d=await fetch('/api/admin/stats').then(r=>r.json());
  document.getElementById('s-users').textContent=d.users;
  document.getElementById('s-streamers').textContent=d.streamers;
  document.getElementById('s-channels').textContent=d.channels;
  document.getElementById('s-codes').textContent=d.codes_available;
}
async function loadUsers(){
  const users=await fetch('/api/admin/users').then(r=>r.json());
  document.getElementById('usersTable').innerHTML=users.map(u=>`
    <tr>
      <td>${u.email}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td>${new Date(u.created_at).toLocaleDateString('es')}</td>
      <td style="display:flex;gap:6px;align-items:center">
        <select class="role-select" onchange="updateRole('${u.id}',this.value)">
          <option ${u.role==='user'?'selected':''} value="user">user</option>
          <option ${u.role==='streamer'?'selected':''} value="streamer">streamer</option>
          <option ${u.role==='admin'?'selected':''} value="admin">admin</option>
        </select>
        <button class="btn-del" onclick="deleteUser('${u.id}')">Eliminar</button>
      </td>
    </tr>`).join('');
}
async function updateRole(id,role){
  await fetch('/api/admin/users/'+id+'/role',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({role})});
  loadUsers();loadStats();
}
async function deleteUser(id){
  if(!confirm('Eliminar usuario?'))return;
  await fetch('/api/admin/users/'+id,{method:'DELETE'});
  loadUsers();loadStats();
}
async function loadCodes(){
  const codes=await fetch('/api/admin/invite-codes').then(r=>r.json());
  document.getElementById('codesTable').innerHTML=codes.map(c=>`
    <tr>
      <td style="font-family:monospace">${c.code}</td>
      <td>${c.used?'<span class="badge-used">Usado</span>':'<span class="badge-active">Disponible</span>'}</td>
      <td>${new Date(c.expires_at).toLocaleDateString('es')}</td>
      <td><button class="btn-del" onclick="deleteCode('${c.id}')">Eliminar</button></td>
    </tr>`).join('');
}
async function generateCodes(){
  const count=parseInt(prompt('Cuantos codigos generar? (1-10)','3'));
  if(!count||isNaN(count))return;
  const data=await fetch('/api/admin/invite-codes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({count,expires_days:30})}).then(r=>r.json());
  const box=document.getElementById('newCodesBox');
  box.style.display='flex';
  box.innerHTML='<span style="font-size:.8rem;color:var(--color-text-muted);width:100%">Clic para copiar:</span>'+
    data.codes.map(c=>`<span class="code-chip" onclick="navigator.clipboard.writeText('${c}');this.textContent='Copiado'">${c}</span>`).join('');
  loadCodes();loadStats();
}
async function deleteCode(id){
  await fetch('/api/admin/invite-codes/'+id,{method:'DELETE'});
  loadCodes();
}
async function loadChannels(){
  const channels=await fetch('/api/admin/channels').then(r=>r.json());
  document.getElementById('channelsTable').innerHTML=channels.map(c=>`
    <tr>
      <td><strong>${c.name}</strong><br><span style="color:var(--color-text-muted);font-size:.8rem">/watch/${c.slug}</span></td>
      <td>${c.type.toUpperCase()}</td>
      <td style="font-size:.8rem;color:var(--color-text-muted)">${c.owner_email||'-'}</td>
      <td>${c.is_live?'<span class="badge-active">EN VIVO</span>':'<span class="badge-used">Offline</span>'}</td>
      <td><button class="btn-del" onclick="deleteChannel('${c.id}')">Eliminar</button></td>
    </tr>`).join('');
}
async function deleteChannel(id){
  if(!confirm('Eliminar canal?'))return;
  await fetch('/api/admin/channels/'+id,{method:'DELETE'});
  loadChannels();loadStats();
}
loadStats();
</script>
</body>
</html>
